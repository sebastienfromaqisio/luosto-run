<script>
'use strict';
const C=document.getElementById('g'),X=C.getContext('2d');
const W=400,H=225;
C.width=W;C.height=H;

// Resize (auto-rotate in portrait to fill screen)
function resize(){
  const vw=document.documentElement.clientWidth;
  const vh=window.visualViewport?window.visualViewport.height:document.documentElement.clientHeight;
  const portrait=vh>vw;
  if(portrait){
    const s=Math.min(vw/H,vh/W);
    const cw=W*s|0,ch=H*s|0;
    C.style.width=cw+'px';
    C.style.height=ch+'px';
    C.style.position='fixed';
    C.style.left=((vw-cw)/2|0)+'px';
    C.style.top=((vh-ch)/2|0)+'px';
    C.style.transform='rotate(90deg)';
    C.style.transformOrigin='center center';
  }else{
    const s=Math.min(vw/W,vh/H);
    C.style.width=(W*s|0)+'px';
    C.style.height=(H*s|0)+'px';
    C.style.position='';C.style.left='';C.style.top='';
    C.style.transform='';C.style.transformOrigin='';
  }
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>{setTimeout(resize,150);setTimeout(resize,500);});
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
resize();

// ============ SOUND (Web Audio) ============
let actx=null,sndOn=true,audioUnlocked=false;
function initAudio(){
  if(actx)return;
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    // Unlock iOS audio with silent buffer
    const buf=actx.createBuffer(1,1,22050);
    const src=actx.createBufferSource();
    src.buffer=buf;src.connect(actx.destination);src.start(0);
    if(actx.state==='suspended')actx.resume();
    audioUnlocked=true;
  }catch(e){}
}
function beep(freq,dur,type,vol){
  if(!sndOn||!actx||!audioUnlocked)return;
  try{
    if(actx.state==='suspended')actx.resume();
    const t=actx.currentTime;
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.08,t);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.connect(g);g.connect(actx.destination);
    o.start(t);o.stop(t+dur);
  }catch(e){}
}
function sndJump(){beep(440,0.07,'square',0.06);}
function sndCollect(){beep(880,0.1,'sine',0.08);setTimeout(()=>beep(1100,0.08,'sine',0.06),50);}
function sndHit(){beep(200,0.15,'sawtooth',0.08);setTimeout(()=>beep(150,0.2,'sawtooth',0.06),100);}
function sndWin(){beep(523,0.1,'sine',0.08);setTimeout(()=>beep(659,0.1,'sine',0.08),100);setTimeout(()=>beep(784,0.15,'sine',0.1),200);}

// ============ CONSTANTS ============
const GND=185, GRAV=700, JMPV=-290, PKX=60;

// ============ LEVEL CONFIGS ============
const LVLS=[null,
  {name:'La Balade en For\u00eat',dist:6000,spd0:80,maxSpd:140,accel:0.008,gap:260,

   sign:'MINE \u2192',hasJoy:true,katSkis:true,bg:'forest',

   colPts:10,
   vicTitle:'For\u00eat travers\u00e9e !',
   vicText:['La balade touche \u00e0 sa fin.',"Au loin, l'entr\u00e9e de la mine d'am\u00e9thyste...",'Joy dort d\u00e9j\u00e0 dans sa luge.']},
  {name:"La Mine d'Am\u00e9thyste",dist:5500,spd0:85,maxSpd:135,accel:0.007,gap:270,
   intro:["On nous a promis des tr\u00e9sors.","On nous a donn\u00e9 une passoire.","On aurait d\u00fb se m\u00e9fier."],
   sign:null,hasJoy:false,katSkis:false,bg:'mine',
   obs:[{n:'rocks',w:20,h:14,wt:4},{n:'beam',w:28,h:8,wt:3},{n:'hole',w:16,h:6,wt:2}],
   colPts:10,colName:'amethyst',
   special:'confiscation',
   vicTitle:'Inspection du butin',
   vicText:[]},
  {name:'Ski de Fond : La Revanche',dist:6500,spd0:85,maxSpd:145,accel:0.007,gap:250,
   intro:['20 km de ski.','Plusieurs chutes.','Z\u00e9ro regret.'],
   sign:null,hasJoy:false,katSkis:true,bg:'forest',
   obs:[{n:'bump',w:18,h:12,wt:4},{n:'branch',w:26,h:10,wt:3},{n:'skier',w:16,h:30,wt:1}],
   colPts:10,falls:3,
   vicTitle:'20 km !',
   vicText:['Distance : 20 km \u2713','Les courbatures arrivent demain.']},
  {name:'Les Huskies',dist:5000,spd0:95,maxSpd:155,accel:0.009,gap:280,
   intro:["Personne n'avait pr\u00e9venu Kat","qu'il y aurait des b\u00e9b\u00e9s huskies.","Personne n'\u00e9tait pr\u00e9par\u00e9."],
   sign:null,hasJoy:false,katSkis:false,bg:'husky',
   obs:[{n:'mound',w:20,h:16,wt:4},{n:'huskyrun',w:18,h:20,wt:2}],
   colPts:25,colName:'babyhusky',
   vicTitle:'Fin de la balade',
   vicText:["Tentatives d'adoption : 3.","Adoptions r\u00e9ussies : 0.","Coeur bris\u00e9 : 1."]},
  {name:'Le Bonhomme de Neige',dist:4500,spd0:75,maxSpd:120,accel:0.006,gap:240,
   intro:["Apr\u00e8s tant d'aventures,","il \u00e9tait temps de laisser","une trace artistique."],
   sign:null,hasJoy:true,katSkis:false,bg:'forest',
   obs:[{n:'mound',w:20,h:16,wt:4},{n:'branch',w:26,h:10,wt:3}],
   colPts:10,colName:'snowpart',
   vicTitle:'Chef-d\'oeuvre !',
   vicText:['Oeuvre sans titre n\u00b01','Artiste : K., mars 2026','Mixed media : neige, b\u00e2tons, r\u00eaves','Direction artistique : Joy']},
  {name:'Les Aurores',dist:5000,spd0:50,maxSpd:60,accel:0.001,gap:9999,
   intro:['Le dernier soir.','Le ciel a d\u00e9cid\u00e9 de nous offrir','le plus beau des cadeaux.'],
   sign:null,hasJoy:true,katSkis:false,bg:'night',noGameOver:true,
   obs:[],colPts:5,
   vicTitle:null,
   vicText:[]},
];

// ============ STATE ============
let st='TITLE',score=0,dist=0,spd=80,dt=0,lastT=0,time=0,canIn=true;
let lvl=1,totalScore=0;
let best=+(localStorage.getItem('luosto_best')||0);
let savedLvl=+(localStorage.getItem('luosto_lvl')||1);

// Player
let kat={x:PKX,y:GND-48,w:32,h:48,vy:0,gnd:true,jc:0,fr:0,ft:0};
// Joy
let joy={tf:0,tt:0,wouf:false,wt:0,wcd:5+Math.random()*10,y:GND-16};
let jyBuf=[];
// Arrays
let obs=[],cols=[],ftxts=[],snow=[];
let nxObs=300,nxCol=180;
let signOn=false,signX=W+20;
// Parallax
let bgO=[0,0,0];

// ============ BACKGROUND DATA ============
const FSEG=800,MSEG=600,TSEG=500;
const mtnP=[],hilP=[];
for(let i=0;i<FSEG;i++){
  mtnP[i]=Math.max(0,Math.sin(i*0.011)*16+Math.sin(i*0.027+1)*12+Math.sin(i*0.006)*20);
}
for(let i=0;i<MSEG;i++){
  hilP[i]=Math.max(0,Math.sin(i*0.018)*16)+Math.max(0,Math.sin(i*0.033+2)*10);
}

// Trees (bigger, denser)
const treeDat=[];
for(let i=0;i<18;i++){
  treeDat.push({x:i*28+(Math.random()*10|0),h:35+(Math.random()*25|0),pine:Math.random()<0.85});
}

// Snow particles
function mkSnow(){
  snow=[];
  for(let i=0;i<50;i++) snow.push({
    x:Math.random()*W,y:Math.random()*H,
    sz:Math.random()<0.3?2:1,
    sp:10+Math.random()*18,
    dx:(Math.random()-0.5)*8
  });
}
mkSnow();

// ============ INPUT ============
function onPress(){
  initAudio();
  if(actx&&actx.state==='suspended')actx.resume();
  if(!canIn)return;
  if(st==='TITLE'){startGame();return;}
  if(st==='INTRO'){st='PLAY';return;}
  if(st==='GAMEOVER'){startLevel(lvl);return;}
  if(st==='CONFISCATION'){st='VICTORY';sndWin();canIn=false;setTimeout(()=>canIn=true,500);return;}
  if(st==='VICTORY'){
    if(lvl<LVLS.length-1){startLevel(lvl+1);}
    else{st='TITLE';}
    return;
  }
  if(st==='PLAY'&&kat.jc<2){kat.vy=JMPV;kat.gnd=false;kat.jc++;sndJump();}
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();onPress();}
});
const tap=document.getElementById('tap');
tap.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();onPress();},{passive:false});
tap.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});
tap.addEventListener('mousedown',e=>{e.preventDefault();onPress();});

// ============ GAME LIFECYCLE ============
function startLevel(n){
  lvl=n;const L=LVLS[lvl];if(!L)return;
  st='INTRO';score=0;dist=0;spd=L.spd0;
  kat={x:PKX,y:GND-48,w:32,h:48,vy:0,gnd:true,jc:0,fr:0,ft:0};
  joy={tf:0,tt:0,wouf:false,wt:0,wcd:5+Math.random()*10,y:GND-16};
  jyBuf=[];obs=[];cols=[];ftxts=[];
  nxObs=300+Math.random()*80;nxCol=150+Math.random()*80;
  signOn=false;signX=W+20;bgO=[0,0,0];
  canIn=false;setTimeout(()=>canIn=true,400);
}
function startGame(){initAudio();startLevel(1);totalScore=0;}
function continueGame(){initAudio();startLevel(savedLvl);totalScore=0;}
function doGO(){
  st='GAMEOVER';sndHit();
  const ts=totalScore+score;
  if(ts>best){best=ts;localStorage.setItem('luosto_best',best);}
  canIn=false;setTimeout(()=>canIn=true,500);
}
let confiscated=0;
function doWin(){
  const L=LVLS[lvl];
  if(L.special==='confiscation'){
    // Amethyst confiscation
    const kept=Math.floor(score*(0.4+Math.random()*0.2)/L.colPts);
    confiscated=score/L.colPts-kept;
    score=kept*L.colPts;
    st='CONFISCATION';sndHit();
  }else{
    st='VICTORY';sndWin();
  }
  totalScore+=score;
  if(totalScore>best){best=totalScore;localStorage.setItem('luosto_best',best);}
  if(lvl<LVLS.length-1){
    localStorage.setItem('luosto_lvl',lvl+1);savedLvl=lvl+1;
  }
  canIn=false;setTimeout(()=>canIn=true,800);
}

// ============ OBSTACLE TYPES ============
function pickOT(){
  const L=LVLS[lvl];if(!L)return{n:'branch',w:26,h:10};
  const ot=L.obs;
  let tot=ot.reduce((s,t)=>s+t.wt,0),r=Math.random()*tot;
  for(const t of ot){r-=t.wt;if(r<=0)return t;}return ot[0];
}

// ============ UPDATE ============
function update(){
  // Snow always updates
  for(const s of snow){
    s.y+=s.sp*dt;s.x+=s.dx*dt;
    if(s.y>H){s.y=-2;s.x=Math.random()*W;}
    if(s.x<0)s.x+=W;if(s.x>W)s.x-=W;
  }

  if(st!=='PLAY')return;

  const L=LVLS[lvl];
  spd=Math.min(L.spd0+dist*L.accel,L.maxSpd);
  dist+=spd*dt;
  bgO[0]+=spd*0.2*dt;bgO[1]+=spd*0.5*dt;bgO[2]+=spd*0.8*dt;

  // Player physics
  if(!kat.gnd){
    kat.vy+=GRAV*dt;
    kat.y+=kat.vy*dt;
    if(kat.y>=GND-kat.h){kat.y=GND-kat.h;kat.vy=0;kat.gnd=true;kat.jc=0;}
  }
  kat.ft+=dt;
  if(kat.ft>0.15){kat.ft=0;kat.fr=(kat.fr+1)%3;}

  // Joy (only if present in this level)
  if(L.hasJoy){
    jyBuf.push(kat.y+kat.h-16);
    if(jyBuf.length>10)jyBuf.shift();
    joy.y=Math.max(GND-28,Math.min(jyBuf[0],GND-16));
    joy.tt+=dt;if(joy.tt>0.25){joy.tt=0;joy.tf=1-joy.tf;}
    joy.wcd-=dt;
    if(joy.wcd<=0){joy.wouf=true;joy.wt=1.2;joy.wcd=8+Math.random()*15;}
    if(joy.wouf){joy.wt-=dt;if(joy.wt<=0)joy.wouf=false;}
  }

  // Spawn obstacles
  if(dist>=nxObs&&dist<L.dist-300){
    const t=pickOT();
    obs.push({x:W+10,y:GND-t.h,w:t.w,h:t.h,n:t.n});
    nxObs=dist+L.gap+Math.random()*100;
  }
  // Spawn collectibles
  if(dist>=nxCol&&dist<L.dist-200){
    const air=Math.random()<0.35;
    cols.push({x:W+10,y:air?GND-50-Math.random()*30:GND-18,w:8,h:8});
    nxCol=dist+130+Math.random()*160;
  }

  // Move obstacles & collectibles
  for(const o of obs)o.x-=spd*dt;
  obs=obs.filter(o=>o.x>-40);
  for(const c of cols)c.x-=spd*dt;
  cols=cols.filter(c=>c.x>-20);

  // Collision obstacles (reduced hitboxes)
  if(!L.noGameOver){
    for(const o of obs){
      const px=kat.x+kat.w*0.15,py=kat.y+kat.h*0.15,pw=kat.w*0.7,ph=kat.h*0.7;
      const ox=o.x+o.w*0.2,oy=o.y+o.h*0.2,ow=o.w*0.6,oh=o.h*0.6;
      if(px<ox+ow&&px+pw>ox&&py<oy+oh&&py+ph>oy){doGO();return;}
    }
  }

  // Collect
  for(let i=cols.length-1;i>=0;i--){
    const c=cols[i];
    if(kat.x<c.x+c.w&&kat.x+kat.w>c.x&&kat.y<c.y+c.h&&kat.y+kat.h>c.y){
      score+=L.colPts;sndCollect();
      ftxts.push({x:c.x,y:c.y,t:'+'+L.colPts,life:0.8});
      cols.splice(i,1);
    }
  }

  // Floating texts
  for(const f of ftxts){f.y-=30*dt;f.life-=dt;}
  ftxts=ftxts.filter(f=>f.life>0);

  // Sign
  if(L.sign&&dist>=L.dist-350&&!signOn){signOn=true;signX=W+20;}
  if(signOn)signX-=spd*dt;

  // Victory
  if(dist>=L.dist)doWin();
}

// ============ SPRITE DRAWING ============

  // Skis
  X.fillStyle='#CC3333';

  X.fillStyle='#3D3D6B';

  // Body
  X.fillStyle='#4488CC';

  X.fillStyle='#3B7ABB';

  X.fillStyle='#3A70AA';

    X.fillRect(x+4,y+20-af,4,10);X.fillRect(x+24,y+20+af,4,10);
    X.fillStyle='#777';
    X.fillRect(x+5,y+18-af,1,22+af);X.fillRect(x+26,y+18+af,1,22-af);

    X.fillRect(x+4,y+38,3,1);X.fillRect(x+25,y+38,3,1);
    X.fillStyle='#DD4444';
    X.fillRect(x+4,y+28-af,4,3);X.fillRect(x+24,y+28+af,4,3);

  // Face
  X.fillStyle='#FFDDAA';X.fillRect(x+10,y+8,12,10);

  X.fillRect(x+12,y+11,1,1);X.fillRect(x+18,y+11,1,1);

  // Cheeks
  X.fillStyle='#FFAAAA';
  X.fillRect(x+10,y+14,2,1);X.fillRect(x+20,y+14,2,1);

  // Smile
  X.fillStyle='#CC8877';X.fillRect(x+14,y+15,4,1);

  // Hair
  X.fillStyle='#E8B830';
  X.fillRect(x+7,y+8,3,12);X.fillRect(x+22,y+8,3,12);
  X.fillRect(x+9,y+7,14,2);

  // Bonnet
  X.fillStyle='#2255AA';
  X.fillRect(x+9,y+1,14,7);X.fillRect(x+11,y,10,2);
  X.fillStyle='#3366CC';X.fillRect(x+10,y+2,12,4);
  X.fillStyle='#DDDDEE';X.fillRect(x+8,y+7,16,2);
  }

    X.fillRect(x+13,y-5,3,2);X.fillRect(x+17,y-5,3,2);

    X.fillRect(x+15,y-1,3,1);

// ============ BACKGROUND ============

function drawPine(cx,gy,h){
  const bw=h*0.4|0;
  // Trunk
  X.fillStyle='#5A3A1A';X.fillRect(cx-2,gy-5,4,7);
  // Foliage layers filling full height
  const nl=h>45?4:3;
  const step=(h-8)/nl|0;
  const lh=step+6;// overlap
  for(let i=0;i<nl;i++){
    const lw=bw*(1-i*0.22)|0;
    const lbot=gy-5-i*step;
    const ltop=lbot-lh;
    X.fillStyle='#1A5528';
    X.fillRect(cx-lw,ltop,lw*2,lh);
    X.fillStyle='#227733';
    X.fillRect(cx-lw+2,ltop+2,lw*2-4,lh-4);
    X.fillStyle='#D8E8F4';
    X.fillRect(cx-lw+1,ltop,lw*2-2,2);
  }
  // Tip
  X.fillStyle='#1A5528';
  X.fillRect(cx-1,gy-h,2,5);
  X.fillStyle='#F0F4FA';X.fillRect(cx-1,gy-h-1,3,2);
}

function drawBirch(cx,gy,h){
  // Taller trunk
  X.fillStyle='#E0DCD4';X.fillRect(cx-1,gy-h,3,h+2);
  // Dark marks
  X.fillStyle='#999990';
  X.fillRect(cx-1,gy-h*0.25,2,1);X.fillRect(cx,gy-h*0.45,2,1);
  X.fillRect(cx-1,gy-h*0.65,2,1);X.fillRect(cx,gy-h*0.85,2,1);
  // Branches
  X.fillStyle='#C8C4B8';
  X.fillRect(cx-5,gy-h*0.7,4,1);X.fillRect(cx+2,gy-h*0.8,5,1);
  X.fillRect(cx-4,gy-h*0.55,3,1);X.fillRect(cx+2,gy-h*0.65,4,1);
  X.fillRect(cx-3,gy-h*0.9,2,1);X.fillRect(cx+2,gy-h*0.95,3,1);
}

function drawSky(){
  const L=LVLS[lvl];
  if(L.bg==='mine'){
    // Mine interior
    const g=X.createLinearGradient(0,0,0,GND);
    g.addColorStop(0,'#3A2A1A');g.addColorStop(1,'#4A3A2A');
    X.fillStyle=g;X.fillRect(0,0,W,GND);
    // Wooden beams on ceiling
    X.fillStyle='#5A4A30';
    for(let i=0;i<8;i++)X.fillRect(i*55+10,0,4,GND);
    X.fillRect(0,0,W,4);
    // Light bulbs
    X.fillStyle='#FFD700';
    for(let bx=40;bx<W;bx+=100){
      X.fillRect(bx,6,2,4);
      X.fillStyle='#FFEE88';X.fillRect(bx-1,10,4,3);
      X.fillStyle='#FFD700';
    }
    return;
  }
  if(L.bg==='night'){
    // Night sky
    const g=X.createLinearGradient(0,0,0,GND);
    g.addColorStop(0,'#0A1030');g.addColorStop(0.5,'#1A2050');g.addColorStop(1,'#2A3060');
    X.fillStyle=g;X.fillRect(0,0,W,GND);
    // Stars
    X.fillStyle='#FFF';
    for(let i=0;i<40;i++){
      const sx=(i*127+43)%W,sy=(i*89+17)%(GND-30);
      if(Math.sin(time*2+i)>0.2)X.fillRect(sx,sy,1,1);
    }
    // Aurora borealis
    X.globalAlpha=0.3;
    for(let ax=0;ax<W;ax+=2){
      const ay=40+Math.sin(ax*0.03+time*0.8)*15+Math.sin(ax*0.01+time*0.3)*10;
      const ah=20+Math.sin(ax*0.02+time*0.5)*8;
      X.fillStyle='#22CC66';X.fillRect(ax,ay,2,ah);
      X.fillStyle='#8844AA';X.fillRect(ax,ay-3,2,4);
      X.fillStyle='#2288AA';X.fillRect(ax,ay+ah-2,2,4);
    }
    X.globalAlpha=1;
    return;
  }
  // Default forest sky
  const g=X.createLinearGradient(0,0,0,GND);
  g.addColorStop(0,'#A8B8CC');g.addColorStop(0.6,'#BCC8D8');g.addColorStop(1,'#D0D8E4');
  X.fillStyle=g;X.fillRect(0,0,W,GND);
}

function drawMtns(){
  const off=bgO[0]|0;
  for(let x=0;x<W;x+=2){

      const top=GND-28-h;
      X.fillStyle='#8898B0';X.fillRect(x,top,2,GND-top);
      X.fillStyle='#C0C8D8';X.fillRect(x,top,2,Math.min(8,GND-top));
    }
  }
}

function drawHills(){

function drawGround(){

    X.fillStyle='#5A4A35';X.fillRect(0,GND,W,H-GND);
    X.fillStyle='#4A3A25';X.fillRect(0,GND,W,2);

    for(let x=-(off%40);x<W;x+=20){
      X.fillRect(x,GND+5,3,2);X.fillRect(x+10,GND+12,2,2);X.fillRect(x+6,GND+8,2,1);
    }

    X.fillStyle='#E4E8F2';X.fillRect(0,GND,W,H-GND);

    for(let x=-(off%60);x<W;x+=30){
      X.fillRect(x,GND+8,10,2);X.fillRect(x+15,GND+16,6,2);

function drawTrees(){
  const off=(bgO[2]|0)%TSEG;
  for(let r=-1;r<=Math.ceil(W/TSEG)+1;r++){
    const bx=-off+r*TSEG;
    for(const t of treeDat){
      const tx=bx+t.x;
      if(tx>-20&&tx<W+20){
        if(t.pine)drawPine(tx,GND,t.h);else drawBirch(tx,GND,t.h);
      }
    }
  }
}

function drawSnow(){
  X.fillStyle='#FFF';
  for(const s of snow)X.fillRect(s.x|0,s.y|0,s.sz,s.sz);
}

function drawHUD(){
  const L=LVLS[lvl];
  X.font='bold 7px monospace';X.textAlign='left';X.fillStyle='#FFF';
  X.fillText(L.name,5,12);
  X.textAlign='right';X.fillText('Score : '+score,W-5,12);
  X.fillStyle='rgba(255,255,255,0.2)';X.fillRect(5,17,80,3);
  X.fillStyle='rgba(255,255,255,0.6)';X.fillRect(5,17,Math.min(80,80*(dist/L.dist)),3);
}

const GOMSG=[
  "Joy exige une pause friandise.",
  "Les skis ont dit non.",
  "Un renne a gagn\u00e9 cette manche.",
  "La neige : 1, Kat : 0."
];

function drawGameOverScreen(){
  X.fillStyle='rgba(10,15,30,0.78)';X.fillRect(0,0,W,H);
  drawKatSit(W/2-16,H/2-30);
  const msg=GOMSG[(score+dist|0)%GOMSG.length];
  X.textAlign='center';X.textBaseline='middle';
  X.font='bold 8px monospace';X.fillStyle='#FFF';X.fillText(msg,W/2,H/2+22);
  X.font='7px monospace';X.fillStyle='#AABBCC';
  X.fillText('Score : '+score+'   Meilleur : '+best,W/2,H/2+36);
  if((time*2|0)%2===0){
    X.font='bold 8px monospace';X.fillStyle='#FFD700';
    X.fillText('R\u00c9ESSAYER',W/2,H/2+52);
  }
  X.textBaseline='alphabetic';
}

function drawVictoryScreen(){
  const L=LVLS[lvl];
  X.fillStyle='rgba(10,20,40,0.82)';X.fillRect(0,0,W,H);
  X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#FFD700';X.font='bold 13px monospace';
  X.fillText(L.vicTitle,W/2,35);
  X.font='7px monospace';X.fillStyle='#CCDDEE';
  for(let i=0;i<L.vicText.length;i++)X.fillText(L.vicText[i],W/2,65+i*16);
  X.fillStyle='#FFD700';X.font='bold 8px monospace';
  X.fillText('Score : '+score,W/2,125);
  X.font='7px monospace';X.fillStyle='#AABBCC';
  X.fillText('Meilleur : '+best,W/2,140);
  if((time*2|0)%2===0){
    X.font='bold 8px monospace';X.fillStyle='#FFF';
    const txt=lvl<LVLS.length-1?'NIVEAU SUIVANT':'REJOUER';
    X.fillText(txt,W/2,175);
  }
  X.textBaseline='alphabetic';
}

function drawConfiscation(){
  X.fillStyle='rgba(20,10,30,0.85)';X.fillRect(0,0,W,H);
  X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#CC4444';X.font='bold 12px monospace';
  X.fillText('Inspection du butin',W/2,30);
  // Kat disappointed
  drawKatSit(W/2-16,55);
  const kept=score/10;
  X.fillStyle='#9944CC';X.font='bold 9px monospace';
  X.fillText('Am\u00e9thystes restantes : '+kept,W/2,120);
  X.fillStyle='#AABBCC';X.font='7px monospace';
  X.fillText('Les larmes ne sont pas rembours\u00e9es.',W/2,138);
  if(kept>0&&confiscated>8){
    X.fillStyle='#FFAA00';X.font='6px monospace';
    X.fillText('Tu y as vraiment cru, hein ?',W/2,152);
  }
  if((time*2|0)%2===0){
    X.font='bold 7px monospace';X.fillStyle='#FFF';
    X.fillText('APPUIE POUR CONTINUER',W/2,175);
  }
  X.textBaseline='alphabetic';
}

function drawFinalScreen(){
  X.fillStyle='rgba(5,5,20,0.92)';X.fillRect(0,0,W,H);
  X.textAlign='center';X.textBaseline='middle';
  const lines=[
    'Luosto, mars 2026.','',
    '20 km de ski.','Quelques chutes.',
    'Des am\u00e9thystes vol\u00e9es.',
    'Un bonhomme de neige \u00e9ph\u00e9m\u00e8re.',
    'Des b\u00e9b\u00e9s huskies (que Joy ne doit jamais savoir).',
    'Et le plus beau ciel qu\'on ait jamais vu.','',
    'Merci pour cette aventure, Kat. \u2764\uFE0F',
    'Voil\u00e0, tu as enfin un brain-rot de qualit\u00e9.','',
    '- Seb & Joy \uD83D\uDC3E'
  ];
  X.font='6px monospace';X.fillStyle='#CCDDEE';
  const startY=14;
  for(let i=0;i<lines.length;i++){
    if(lines[i]==='')continue;
    if(i===0||i>=9){X.fillStyle='#FFD700';X.font='bold 7px monospace';}
    else{X.fillStyle='#CCDDEE';X.font='6px monospace';}
    X.fillText(lines[i],W/2,startY+i*14);
  }
  X.fillStyle='#AABBCC';X.font='7px monospace';
  X.fillText('Score total : '+totalScore,W/2,195);
  if((time*2|0)%2===0){
    X.font='bold 7px monospace';X.fillStyle='#FFF';
    X.fillText('REJOUER',W/2,212);
  }
  X.textBaseline='alphabetic';
}

// ============ MAIN DRAW ============

function draw(){
  X.imageSmoothingEnabled=false;

  if(st==='TITLE'){drawTitleScreen();return;}
  if(st==='INTRO'){drawIntroScreen();return;}

  // Game world
  const L=LVLS[lvl];
  drawSky();
  if(L.bg!=='mine'){drawMtns();drawHills();}
  drawGround();
  if(L.bg!=='mine')drawTrees();

  // Obstacles
  for(const o of obs)drawObstacle(o);
  // Collectibles
  for(const c of cols)drawCol(c);
  // Sign
  if(signOn&&L.sign)drawSign(signX);
  // Joy
  if(L.hasJoy)drawJoySled(kat.x-36,joy.y,joy.tf,joy.wouf);
  // Kat
  drawKat(kat.x,kat.y,kat.fr,!kat.gnd);

  if(L.bg!=='mine')drawSnow();

  // Floating texts
  for(const f of ftxts){
    X.globalAlpha=Math.max(0,f.life);
    X.fillStyle='#FFD700';X.font='bold 7px monospace';X.textAlign='center';
    X.fillText(f.t,f.x+4,f.y);
  }
  X.globalAlpha=1;

  // Overlays
  if(st==='PLAY')drawHUD();
  else if(st==='GAMEOVER')drawGameOverScreen();
  else if(st==='CONFISCATION')drawConfiscation();
  else if(st==='VICTORY'){
    if(lvl===6)drawFinalScreen();
    else drawVictoryScreen();
  }
}

// ============ LOOP ============
function loop(ts){
  dt=Math.min((ts-lastT)/1000,0.05);
  lastT=ts;time+=dt;
  update();draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
</body>
